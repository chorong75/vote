<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>학생회장 선거 투표</title>
<link rel="stylesheet" href="style.css"/>
</head>
<body>
<header>
  <div class="top">
    <div class="brand">
      <h1 id="topTitle">학생회장 선거</h1>
      <p>학생 투표 전용 화면 · 태블릿용</p>
    </div>
    <div class="nav">
      <a href="admin.html">관리자</a>
    </div>
  </div>
</header>
<main class="votePageMain">
  <div id="msg" class="msg"></div>
  <section class="voteOnlyGrid">
    <div class="card tabletSetupCard">
      <div class="row">
        <div>
          <h2>태블릿 투표소 선택</h2>
          <p class="muted">투표 시작 전, 이 태블릿이 놓인 투표소를 선택해 두세요.</p>
        </div>
        <div>
          <label>현재 태블릿 투표소</label>
          <select id="stationSelect"></select>
        </div>
      </div>
    </div>

    <div class="card bigVoteCard">
      <div id="votePanel">
        <div class="boothHeader">
          <div class="boothTitle" id="electionTitle">학생회장 선거</div>
          <div class="boothStation" id="stationName">제1투표소</div>
          <div class="boothClassLabel">현재 투표 학급</div>
          <div class="boothClass wait" id="classText">투표 대기 중</div>
          <div class="pill wait boothCount" id="countText">대기 중</div>
        </div>

        <div class="bigCandidateList" id="candidateList"></div>
        <button id="voteButton" class="bigVoteButton" disabled>투표하기</button>
      </div>

      <div id="completePanel" class="bigComplete hidden">
        <div class="check">✓</div>
        <h2>투표가 완료되었습니다</h2>
        <p class="muted">'소중한 한 표가 후보자들에게 큰 힘이 됩니다😊'</p>
      </div>
    </div>
  </section>

  <div id="confirmOverlay" class="confirmOverlay hidden">
    <div class="confirmBox">
      <div class="confirmLabel">선택한 후보가 맞습니까?</div>
      <div class="confirmNum" id="confirmNum">기호 1번</div>
      <div class="confirmName" id="confirmName">후보명</div>
      <div class="confirmActions">
        <button class="ghost" id="confirmCancel">취소</button>
        <button id="confirmOk">투표하기</button>
      </div>
    </div>
  </div>
</main>

<script type="module">
import {
  createFirebase, refs, DEFAULT_SETTINGS, DEFAULT_STATIONS, ensureClasses, ensureStations,
  getDoc, setDoc, onSnapshot, addDoc, serverTimestamp, withTimeout, escapeHtml
} from "./firebase.js";

let settings = structuredClone(DEFAULT_SETTINGS);
let stations = structuredClone(DEFAULT_STATIONS);
let votes = [];
let selectedCandidate = null;
let stationKey = localStorage.getItem("schoolVoteV2Station") || "grade1";
let db = null;
let saving = false;

const msgEl = document.getElementById("msg");
function msg(text,type="ok"){
  msgEl.textContent=text;
  msgEl.className=`msg show ${type}`;
  clearTimeout(window.__msg);
  window.__msg=setTimeout(()=>msgEl.className="msg",2600);
}
function countVotes(classKey,candidateNum=null){
  return votes.filter(v=>v.classKey===classKey && (candidateNum==null || Number(v.candidateNum)===Number(candidateNum))).length;
}
function classTotal(key){ return settings.classes?.[key]?.total || 0; }

async function init(){
  const created=createFirebase();
  db=created.db;
  if(!db){
    msg("Firebase 설정이 필요합니다. 관리자 페이지에서 먼저 설정하세요.","err");
    render();
    return;
  }
  const r=refs(db);
  if(!(await getDoc(r.settingsRef)).exists()){
    ensureClasses(settings);
    await setDoc(r.settingsRef, settings);
  }
  if(!(await getDoc(r.stationsRef)).exists()){
    await setDoc(r.stationsRef, stations);
  }
  onSnapshot(r.settingsRef, snap=>{
    settings=snap.data() || structuredClone(DEFAULT_SETTINGS);
    ensureClasses(settings);
    ensureStations(settings, stations);
    render();
  }, err=>{
    console.error(err);
    msg("설정 데이터를 읽지 못했습니다. Firebase 규칙을 확인하세요.","err");
  });
  onSnapshot(r.stationsRef, snap=>{
    stations=snap.data() || structuredClone(DEFAULT_STATIONS);
    ensureStations(settings, stations);
    render();
  }, err=>{
    console.error(err);
    msg("투표소 데이터를 읽지 못했습니다. Firebase 규칙을 확인하세요.","err");
  });
  onSnapshot(r.votesCol, snap=>{
    votes=snap.docs.map(d=>({id:d.id,...d.data()}));
    render();
  }, err=>{
    console.error(err);
    msg("투표 데이터를 읽지 못했습니다. Firebase 규칙을 확인하세요.","err");
  });
}

function render(){
  ensureClasses(settings);
  ensureStations(settings, stations);

  document.getElementById("topTitle").textContent=settings.electionName || "학생회장 선거";
  document.getElementById("electionTitle").textContent=settings.electionName || "학생회장 선거";

  const stationSelect=document.getElementById("stationSelect");
  stationSelect.innerHTML="";
  for(let g=1; g<=Number(settings.gradeCount||3); g++){
    const key=`grade${g}`;
    const st=stations[key];
    if(st) stationSelect.innerHTML+=`<option value="${key}">${escapeHtml(st.color||"")} ${escapeHtml(st.name)} (${g}학년)</option>`;
  }
  if(!stations[stationKey]) stationKey="grade1";
  stationSelect.value=stationKey;

  const st=stations[stationKey] || stations.grade1;
  if(!st) return;
  document.getElementById("stationName").textContent=`${st.color||""} ${st.name}`.trim();

  const classEl=document.getElementById("classText");
  classEl.textContent=st.isOpen ? st.currentClass : "투표 대기 중";
  classEl.className="boothClass" + (st.isOpen ? "" : " wait");

  const total=classTotal(st.currentClass);
  const voted=countVotes(st.currentClass);
  const countEl=document.getElementById("countText");
  countEl.className="pill boothCount " + (st.isOpen ? "live" : "wait");
  countEl.textContent=st.isOpen ? `현재 투표수 ${voted} / ${total}명` : "대기 중";

  const list=document.getElementById("candidateList");
  list.innerHTML="";
  settings.candidates.forEach(c=>{
    const isSelected=Number(selectedCandidate)===Number(c.num);
    const div=document.createElement("div");
    div.className="bigCandidate" + (isSelected ? " selected" : "") + (!st.isOpen ? " disabled" : "");
    div.innerHTML=`<div class="numBig">기호<br>${escapeHtml(c.num)}번</div><div class="nameBig">${escapeHtml(c.name)}</div><div class="secretMark">✓</div>`;
    div.onclick=()=>{
      if(!st.isOpen){ msg("현재 투표 대기 중입니다.","err"); return; }
      if(saving) return;
      selectedCandidate=c.num;
      render();
    };
    list.appendChild(div);
  });

  const full = total > 0 && voted >= total;
  const btn=document.getElementById("voteButton");
  btn.disabled=!(db && st.isOpen && selectedCandidate && !full && !saving);
  btn.textContent=saving ? "저장 중..." : (full ? "재적 인원 도달" : "투표하기");
}

document.getElementById("stationSelect").addEventListener("change",(e)=>{
  stationKey=e.target.value;
  localStorage.setItem("schoolVoteV2Station", stationKey);
  selectedCandidate=null;
  render();
});

function openConfirm(){
  const cand=settings.candidates.find(c=>Number(c.num)===Number(selectedCandidate));
  if(!cand) return;
  document.getElementById("confirmNum").textContent=`기호 ${cand.num}번`;
  document.getElementById("confirmName").textContent=cand.name;
  document.getElementById("confirmOverlay").classList.remove("hidden");
}
function closeConfirm(){
  document.getElementById("confirmOverlay").classList.add("hidden");
}
document.getElementById("confirmCancel").addEventListener("click", closeConfirm);
document.getElementById("confirmOk").addEventListener("click", async ()=>{
  closeConfirm();
  await saveVote();
});

document.getElementById("voteButton").addEventListener("click", ()=>{
  if(!db){ msg("Firebase 설정이 필요합니다.","err"); return; }
  const st=stations[stationKey];
  if(!st || !st.isOpen){ msg("현재 투표 대기 중입니다.","err"); return; }
  if(!selectedCandidate){ msg("후보를 먼저 선택하세요.","err"); return; }
  const total=classTotal(st.currentClass);
  const voted=countVotes(st.currentClass);
  if(total > 0 && voted >= total){ msg("해당 학급 재적 인원에 도달했습니다.","err"); return; }
  openConfirm();
});

async function saveVote(){
  if(saving) return;
  const st=stations[stationKey];
  if(!st || !st.isOpen) return msg("현재 투표 대기 중입니다.","err");
  const candidateNum=Number(selectedCandidate);
  selectedCandidate=null;
  saving=true;
  render();

  try{
    const r=refs(db);
    await withTimeout(addDoc(r.votesCol,{
      stationKey,
      grade:st.grade,
      classKey:st.currentClass,
      candidateNum,
      createdAt:serverTimestamp()
    }),10000,"투표 저장");

    document.getElementById("votePanel").classList.add("hidden");
    document.getElementById("completePanel").classList.remove("hidden");
    msg("투표가 정상적으로 저장되었습니다.");
    setTimeout(()=>{
      document.getElementById("completePanel").classList.add("hidden");
      document.getElementById("votePanel").classList.remove("hidden");
      saving=false;
      render();
    },1300);
  }catch(err){
    console.error(err);
    alert(err.message || "투표 저장 실패");
    msg(err.message || "투표 저장 실패","err");
    saving=false;
    render();
  }
}

init().catch(err=>{
  console.error(err);
  msg("Firebase 연결 실패: " + (err.message || err), "err");
});
</script>
</body>
</html>
