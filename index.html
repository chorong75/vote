<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>학생회장 선거 투표</title>
<link rel="stylesheet" href="style.css"/>
</head>
<body>
<header>
  <div class="top">
    <div class="brand">
      <h1 id="topTitle">학생회장 선거</h1>
      <p>학생 투표 전용 화면 · 태블릿용</p>
    </div>
    <div class="nav">
      <a href="admin.html">관리자</a>
    </div>
  </div>
</header>
<main>
  <div id="msg" class="msg"></div>
  <section class="grid">
    <div class="card">
      <h2>태블릿 투표소 선택</h2>
      <label>현재 태블릿이 놓인 투표소</label>
      <select id="stationSelect"></select>
      <div class="notice" style="margin-top:14px">
        이 화면은 학생 투표 전용입니다. 관리자 설정은 별도 admin.html에서 진행합니다.
      </div>
    </div>
    <div class="card">
      <div id="votePanel">
        <div class="voteHeader">
          <div class="title" id="electionTitle">학생회장 선거</div>
          <div class="station" id="stationName">제1투표소</div>
          <div class="muted" id="classText">투표 대기 중</div>
          <div class="pill wait" id="countText" style="margin-top:10px">대기 중</div>
        </div>
        <h2 style="margin-top:18px">후보를 선택하세요</h2>
        <div class="candidateList" id="candidateList"></div>
        <button id="voteButton" class="voteButton" disabled>투표하기</button>
      </div>
      <div id="completePanel" class="complete hidden">
        <div class="check">✓</div>
        <h2>투표가 완료되었습니다</h2>
        <p class="muted">표가 정상적으로 저장되었습니다. 잠시 후 다음 학생 투표 화면으로 돌아갑니다.</p>
      </div>
    </div>
  </section>
</main>

<script type="module">
import {
  createFirebase, refs, DEFAULT_SETTINGS, DEFAULT_STATIONS, ensureClasses, ensureStations,
  getDoc, setDoc, onSnapshot, addDoc, collection, serverTimestamp, withTimeout, escapeHtml
} from "./firebase.js";

let settings = structuredClone(DEFAULT_SETTINGS);
let stations = structuredClone(DEFAULT_STATIONS);
let votes = [];
let selectedCandidate = null;
let stationKey = localStorage.getItem("schoolVoteV2Station") || "grade1";
let db = null;

const msgEl = document.getElementById("msg");
function msg(text,type="ok"){
  msgEl.textContent=text;
  msgEl.className=`msg show ${type}`;
  clearTimeout(window.__msg);
  window.__msg=setTimeout(()=>msgEl.className="msg",3500);
}
function countVotes(classKey,candidateNum=null){
  return votes.filter(v=>v.classKey===classKey && (candidateNum==null || Number(v.candidateNum)===Number(candidateNum))).length;
}
function classTotal(key){ return settings.classes?.[key]?.total || 0; }

async function init(){
  const created=createFirebase();
  db=created.db;
  if(!db){
    msg("Firebase 설정이 필요합니다. 관리자 페이지에서 먼저 설정하세요.","err");
    render();
    return;
  }
  const r=refs(db);
  if(!(await getDoc(r.settingsRef)).exists()){
    ensureClasses(settings);
    await setDoc(r.settingsRef, settings);
  }
  if(!(await getDoc(r.stationsRef)).exists()){
    await setDoc(r.stationsRef, stations);
  }
  onSnapshot(r.settingsRef, snap=>{
    settings=snap.data() || structuredClone(DEFAULT_SETTINGS);
    ensureClasses(settings);
    ensureStations(settings, stations);
    render();
  }, err=>{
    console.error(err);
    msg("설정 데이터를 읽지 못했습니다. Firebase 규칙을 확인하세요.","err");
  });
  onSnapshot(r.stationsRef, snap=>{
    stations=snap.data() || structuredClone(DEFAULT_STATIONS);
    ensureStations(settings, stations);
    render();
  }, err=>{
    console.error(err);
    msg("투표소 데이터를 읽지 못했습니다. Firebase 규칙을 확인하세요.","err");
  });
  onSnapshot(r.votesCol, snap=>{
    votes=snap.docs.map(d=>({id:d.id,...d.data()}));
    render();
  }, err=>{
    console.error(err);
    msg("투표 데이터를 읽지 못했습니다. Firebase 규칙을 확인하세요.","err");
  });
}

function render(){
  ensureClasses(settings);
  ensureStations(settings, stations);

  document.getElementById("topTitle").textContent=settings.electionName || "학생회장 선거";
  document.getElementById("electionTitle").textContent=settings.electionName || "학생회장 선거";

  const stationSelect=document.getElementById("stationSelect");
  stationSelect.innerHTML="";
  for(let g=1; g<=Number(settings.gradeCount||3); g++){
    const key=`grade${g}`;
    const st=stations[key];
    if(st){
      stationSelect.innerHTML+=`<option value="${key}">${escapeHtml(st.name)} (${g}학년)</option>`;
    }
  }
  if(!stations[stationKey]) stationKey="grade1";
  stationSelect.value=stationKey;

  const st=stations[stationKey] || stations.grade1;
  if(!st) return;
  document.getElementById("stationName").textContent=st.name;
  document.getElementById("classText").textContent=st.isOpen ? `현재 투표 학급: ${st.currentClass}` : "현재 투표 대기 중";

  const total=classTotal(st.currentClass);
  const voted=countVotes(st.currentClass);
  const countEl=document.getElementById("countText");
  countEl.className="pill " + (st.isOpen ? "live" : "wait");
  countEl.textContent=st.isOpen ? `현재 투표수 ${voted} / ${total}명` : "투표 대기 중";

  const list=document.getElementById("candidateList");
  list.innerHTML="";
  settings.candidates.forEach(c=>{
    const isSelected=Number(selectedCandidate)===Number(c.num);
    const div=document.createElement("div");
    div.className="candidate" + (isSelected ? " selected" : "");
    div.innerHTML=`<div><div class="num">기호 ${escapeHtml(c.num)}번</div><div class="name">${escapeHtml(c.name)}</div></div><div style="font-size:32px">${isSelected?"●":"○"}</div>`;
    div.onclick=()=>{
      if(!st.isOpen){ msg("현재 투표 대기 중입니다.","err"); return; }
      selectedCandidate=c.num;
      render();
    };
    list.appendChild(div);
  });

  const full = total > 0 && voted >= total;
  const btn=document.getElementById("voteButton");
  btn.disabled=!(db && st.isOpen && selectedCandidate && !full);
  btn.textContent=full ? "재적 인원 도달" : "투표하기";
}

document.getElementById("stationSelect").addEventListener("change",(e)=>{
  stationKey=e.target.value;
  localStorage.setItem("schoolVoteV2Station", stationKey);
  selectedCandidate=null;
  render();
});

document.getElementById("voteButton").addEventListener("click", async ()=>{
  if(!db){ msg("Firebase 설정이 필요합니다.","err"); return; }
  const st=stations[stationKey];
  if(!st || !st.isOpen){ msg("현재 투표 대기 중입니다.","err"); return; }
  if(!selectedCandidate){ msg("후보를 먼저 선택하세요.","err"); return; }
  const total=classTotal(st.currentClass);
  const voted=countVotes(st.currentClass);
  if(total > 0 && voted >= total){ msg("해당 학급 재적 인원에 도달했습니다.","err"); return; }

  const cand=settings.candidates.find(c=>Number(c.num)===Number(selectedCandidate));
  if(!confirm(`기호 ${selectedCandidate}번${cand?` (${cand.name})`:""}에게 투표할까요?\n투표 후에는 취소할 수 없습니다.`)) return;

  const candidateNum=Number(selectedCandidate);
  selectedCandidate=null;
  const btn=document.getElementById("voteButton");
  btn.disabled=true;
  btn.textContent="저장 중...";

  try{
    const r=refs(db);
    await withTimeout(addDoc(r.votesCol,{
      stationKey,
      grade:st.grade,
      classKey:st.currentClass,
      candidateNum,
      createdAt:serverTimestamp()
    }),10000,"투표 저장");
    document.getElementById("votePanel").classList.add("hidden");
    document.getElementById("completePanel").classList.remove("hidden");
    msg("투표가 정상적으로 저장되었습니다.");
    setTimeout(()=>{
      document.getElementById("completePanel").classList.add("hidden");
      document.getElementById("votePanel").classList.remove("hidden");
      btn.textContent="투표하기";
      render();
    },2200);
  }catch(err){
    console.error(err);
    alert(err.message || "투표 저장 실패");
    msg(err.message || "투표 저장 실패","err");
    btn.textContent="투표하기";
    render();
  }
});

init().catch(err=>{
  console.error(err);
  msg("Firebase 연결 실패: " + (err.message || err), "err");
});
</script>
</body>
</html>
